name: Auto-Increment Version

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

jobs:
  increment-version:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Increment version
        id: increment
        run: |
          node -e "
            const fs = require('fs');
            const versionFile = 'lib/version.ts';
            const content = fs.readFileSync(versionFile, 'utf8');
            const match = content.match(/export const APP_VERSION = \"(\d+\.\d+\.\d+)\"/);
            if (!match) throw new Error('Could not find version in lib/version.ts');
            
            const [major, minor, patch] = match[1].split('.');
            const newPatch = parseInt(patch) + 1;
            const newVersion = \`\${major}.\${minor}.\${newPatch}\`;
            const newContent = content.replace(/export const APP_VERSION = \"[^\"]+\"/, \`export const APP_VERSION = \"\${newVersion}\"\`);
            
            fs.writeFileSync(versionFile, newContent);
            console.log('New version: ' + newVersion);
          "

      - name: Commit and push version bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add lib/version.ts
          git commit -m "chore: auto-increment version" || echo "No changes to commit"
          git push || echo "Failed to push"
